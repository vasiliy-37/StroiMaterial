services:
  postgres:
    image: postgres:16-alpine
    container_name: stroimaterial-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: buildpro
      POSTGRES_PASSWORD: buildpro
      POSTGRES_DB: buildpro
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U buildpro -d buildpro']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
