@if (confirm.dialog(); as dialog) {
  <div class="confirm-backdrop" (click)="cancel()">
    <div class="confirm card" role="dialog" aria-modal="true" (click)="$event.stopPropagation()">
      <h2 class="headline-md">{{ dialog.title }}</h2>
      <p class="confirm__message">{{ dialog.message }}</p>
      <div class="confirm__actions">
        <button type="button" class="btn btn--outline" (click)="cancel()">{{ dialog.cancelLabel }}</button>
        <button type="button" class="btn btn--primary" (click)="accept()">{{ dialog.confirmLabel }}</button>
      </div>
    </div>
  </div>
}
