<div class="toast-host" aria-live="polite" aria-atomic="true">
  @for (item of toast.toasts(); track item.id) {
    <div class="toast toast--{{ item.type }}" role="status">
      <span class="material-symbols-outlined toast__icon">
        @switch (item.type) {
          @case ('error') { error }
          @case ('info') { info }
          @default { check_circle }
        }
      </span>
      <span class="toast__text">{{ item.message }}</span>
      <button type="button" class="toast__close" aria-label="Close" (click)="dismiss(item.id)">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
  }
</div>
