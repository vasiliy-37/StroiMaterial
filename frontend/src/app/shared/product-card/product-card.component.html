<article class="product-card card">
  <a [routerLink]="['/product', product().id]" class="product-card__image">
    @if (product().badge === 'sale') {
      <span class="product-card__badge product-card__badge--sale">SALE</span>
    }
    @if (product().badge === 'pro') {
      <span class="product-card__badge product-card__badge--pro">Pro-Grade</span>
    }
    <app-product-image [src]="product().image" [alt]="name()" />
    <button
      type="button"
      class="product-card__fav glass-card"
      [class.product-card__fav--active]="isFavorite()"
      [class.product-card__fav--pop]="favPop()"
      [attr.aria-label]="t(isFavorite() ? 'aria.unfavorite' : 'aria.favorite')"
      (click)="toggleFavorite($event)"
    >
      <span class="material-symbols-outlined" [class.filled]="isFavorite()">favorite</span>
    </button>
  </a>
  <div class="product-card__body">
    <div class="product-card__stock">
      <div class="product-card__stock-bar"><span [style.width.%]="product().stock"></span></div>
      <span>{{ stockLabel() }}</span>
    </div>
    <h3 class="product-card__title">
      <a [routerLink]="['/product', product().id]">{{ name() }}</a>
    </h3>
    <div class="product-card__footer">
      <div>
        @if (product().oldPrice) {
          <div class="product-card__price-old">{{ product().oldPrice | currency:'RUB':'symbol-narrow':'1.0-0' }}</div>
        }
        <div class="product-card__price">{{ product().price | currency:'RUB':'symbol-narrow':'1.0-0' }}</div>
      </div>
      <button
        type="button"
        class="product-card__cart-btn"
        [disabled]="adding()"
        [attr.aria-label]="t('aria.addToCart')"
        (click)="addToCart($event)"
      >
        @if (adding()) {
          <span class="spinner spinner--sm" aria-hidden="true"></span>
        } @else {
          <span class="material-symbols-outlined">add_shopping_cart</span>
        }
      </button>
    </div>
  </div>
</article>
